<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Circular background -->
  <circle cx="200" cy="200" r="200" fill="#0f172a"/>
  
  <!-- Space background with stars inside circle -->
  <g clip-path="url(#circular-clip)">
    <circle cx="80" cy="80" r="1" fill="white" opacity="0.8"/>
    <circle cx="150" cy="60" r="1.5" fill="white" opacity="0.6"/>
    <circle cx="300" cy="100" r="1" fill="white" opacity="0.9"/>
    <circle cx="320" cy="150" r="1.2" fill="white" opacity="0.7"/>
    <circle cx="100" cy="200" r="1" fill="white" opacity="0.8"/>
    <circle cx="320" cy="250" r="1.5" fill="white" opacity="0.6"/>
    <circle cx="120" cy="320" r="1" fill="white" opacity="0.9"/>
    <circle cx="280" cy="300" r="1.2" fill="white" opacity="0.7"/>
    <circle cx="60" cy="250" r="1" fill="white" opacity="0.8"/>
    <circle cx="340" cy="200" r="1.5" fill="white" opacity="0.6"/>
    
    <!-- Earth -->
    <circle cx="200" cy="280" r="70" fill="#1e40af" opacity="0.9"/>
    <path d="M 150 265 Q 170 245 190 265 Q 210 285 230 265 Q 250 245 270 265" 
          stroke="#10b981" stroke-width="3" fill="none" opacity="0.9"/>
    <path d="M 155 295 Q 175 315 195 295 Q 215 275 235 295 Q 255 315 275 295" 
          stroke="#10b981" stroke-width="2" fill="none" opacity="0.7"/>
    
    <!-- Satellite body -->
    <rect x="185" y="140" width="30" height="20" rx="2" fill="#374151"/>
    <rect x="187" y="142" width="26" height="16" rx="1" fill="#6b7280"/>
    
    <!-- Solar panels -->
    <rect x="165" y="137" width="15" height="26" rx="1" fill="#1f2937"/>
    <rect x="220" y="137" width="15" height="26" rx="1" fill="#1f2937"/>
    
    <!-- Solar panel details -->
    <g stroke="#3b82f6" stroke-width="0.5" opacity="0.8">
      <line x1="167" y1="140" x2="178" y2="140"/>
      <line x1="167" y1="144" x2="178" y2="144"/>
      <line x1="167" y1="148" x2="178" y2="148"/>
      <line x1="167" y1="152" x2="178" y2="152"/>
      <line x1="167" y1="156" x2="178" y2="156"/>
      <line x1="167" y1="160" x2="178" y2="160"/>
      
      <line x1="222" y1="140" x2="233" y2="140"/>
      <line x1="222" y1="144" x2="233" y2="144"/>
      <line x1="222" y1="148" x2="233" y2="148"/>
      <line x1="222" y1="152" x2="233" y2="152"/>
      <line x1="222" y1="156" x2="233" y2="156"/>
      <line x1="222" y1="160" x2="233" y2="160"/>
    </g>
    
    <!-- Antenna -->
    <line x1="200" y1="140" x2="200" y2="125" stroke="#e5e7eb" stroke-width="2"/>
    <circle cx="200" cy="125" r="2.5" fill="#ef4444"/>
    
    <!-- Signal waves -->
    <g stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.6">
      <path d="M 200 155 Q 170 175 200 195 Q 230 175 200 155"/>
      <path d="M 200 160 Q 175 175 200 190 Q 225 175 200 160"/>
      <path d="M 200 165 Q 185 175 200 185 Q 215 175 200 165"/>
    </g>
    
    <!-- GEOVISION text -->
    <text x="200" y="90" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="20" font-weight="bold">
      GEOVISION
    </text>
    <text x="200" y="360" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="10">
      Earth Observation Platform
    </text>
  </g>
  
  <!-- Circular border -->
  <circle cx="200" cy="200" r="198" fill="none" stroke="#1e40af" stroke-width="4" opacity="0.3"/>
  
  <!-- Clipping path for circular design -->
  <defs>
    <clipPath id="circular-clip">
      <circle cx="200" cy="200" r="200"/>
    </clipPath>
  </defs>
</svg>